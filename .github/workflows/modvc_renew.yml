name: ModVC-Renew

on:
  #schedule:
  #  - cron: '0 0 */5 * *'  # 每5天执行一次
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 拉取私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ModVC-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 复制脚本到工作目录
        run: cp private/modvc_renew.py modvc_renew.py

      - name: 🐍 安装依赖
        run: pip install requests pysocks

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed 's/\.[0-9]*$/.**/' && echo

      - name: 🔄 执行自动续期
        env:
          MODVC_REFRESH_TOKEN: ${{ secrets.MODVC_REFRESH_TOKEN }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: python modvc_renew.py
